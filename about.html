              <h1 id="about-title">你好呀，我是 Motral</h1>
            </div>
          </div>

          <div class="about-copy">
            <p>
              欢迎来到我的小小博客空间。这里会慢慢记录 Python 学习、折腾网页的小发现，
              还有一些日常里亮晶晶的想法。
            </p>
            <p>
              现在站点还在一点点搭建中，像给玻璃罐里收集糖纸一样，把喜欢的颜色、
              可爱的组件和实用的小功能慢慢放进来。
            </p>
            <p>
              如果你也有自己的博客，欢迎来交换友链。可以通过邮箱告诉我你的站点名称、
              链接、一句话介绍和头像地址，我看到后会把它放到右侧的友链小框里。
            </p>
          </div>

          <a class="github-button" href="https://github.com/mortalkit1101-ui" target="_blank" rel="noreferrer">
            <svg viewBox="0 0 24 24" aria-hidden="true">
