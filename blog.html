<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>博客 | Motral</title>
    <meta name="description" content="Motral blog interface." />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="glass-nav" aria-label="主导航">
        <a class="brand" href="./index.html">Motral</a>
        <nav class="nav-links">
          <a href="./index.html">首页</a>
          <a class="active" href="./blog.html">博客</a>
          <a href="./notes.html">动态</a>
          <a href="./about.html">关于</a>
        </nav>
        <div class="nav-actions" aria-label="快捷操作">
          <button type="button" aria-label="搜索">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" />
            </svg>
          </button>
          <button class="accent" type="button" aria-label="随机浏览">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5" />
            </svg>
          </button>
          <button id="themeToggle" type="button" aria-label="切换深色模式">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12.8A8.6 8.6 0 1 1 11.2 3a6.8 6.8 0 0 0 9.8 9.8Z" />
            </svg>
          </button>
        </div>
      </header>

      <main>
        <section class="hero-grid" aria-label="博客页概览">
          <article class="glass-card profile-card">
            <div class="avatar-ring">
              <img class="avatar" src="./assets/avatar.jpg" alt="Motral 头像" />
            </div>
            <h1>Motral</h1>
            <div class="badge-row" aria-label="个人标签">
              <span>学生</span>
            </div>
            <a class="contact-link" href="mailto:mortalkit1101@gmail.com">
              mortalkit1101@gmail.com
            </a>
          </article>

          <article class="glass-card activity-card" aria-labelledby="blog-activity-title">
            <div class="section-head">
              <div>
                <p class="eyebrow">GitHub Activity</p>
                <h2 id="blog-activity-title">活跃度</h2>
              </div>
              <span class="status-pill">@mortalkit1101-ui</span>
            </div>
            <div class="month-row" aria-hidden="true">
              <span>一月</span><span>二月</span><span>三月</span><span>四月</span>
              <span>五月</span><span>六月</span><span>七月</span><span>八月</span>
              <span>九月</span><span>十月</span><span>十一月</span><span>十二月</span>
            </div>
            <div class="contribution-grid" aria-label="贡献日历视觉预览"></div>
            <div class="activity-summary">
              <p>正在同步 <strong>GitHub</strong> 活跃度...</p>
              <div class="legend" aria-label="活跃度图例">
                <span>少</span>
                <i></i><i></i><i></i><i></i>
                <span>多</span>
              </div>
            </div>
          </article>
        </section>

        <div class="chip-row" aria-label="分类">
          <a href="./blog.html">python基础</a>
        </div>

        <section class="content-grid">
          <div class="main-column">
            <section class="glass-card section-card" id="blog" aria-labelledby="blog-title">
              <div class="section-head">
                <div>
                  <p class="eyebrow">Blog</p>
                  <h2 id="blog-title">最新文章</h2>
                </div>
                <a class="text-link" href="./blog.html">全部文章</a>
              </div>
              <a class="post-card" href="./posts/python-basics.html">
                <span class="post-date">2026-06-13</span>
                <h3>Python 基础</h3>
                <p>记录字面量、数据类型、类型转换、字符串和数据输入。</p>
                <span class="post-tag">python基础</span>
              </a>
            </section>
          </div>

          <aside class="side-column" aria-label="侧边栏">
            <section class="glass-card sidebar-card">
              <h2>小tips</h2>
              <a class="mini-post" href="./posts/python-basics.html">从 <code>type()</code> 开始理解 Python 数据类型</a>
            </section>
          </aside>
        </section>
      </main>

    </div>

    <script src="./script.js"></script>
  </body>
</html>
